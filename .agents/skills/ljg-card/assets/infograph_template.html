<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;700&display=swap');

  :root {
    --bg: #F2F2F2;
    --green: #B8D8BE;
    --pink: #E91E63;
    --yellow: #FFF200;
    --ink: #2D2926;
    --ink-light: #5C5350;
    --white: #FFFFFF;
    --serif: 'DM Serif Display', 'KingHwa_OldSong', Georgia, 'Noto Serif SC', serif;
    --sans: 'DM Sans', 'KingHwa_OldSong', -apple-system, 'PingFang SC', system-ui, sans-serif;
    --mono: 'SF Mono', 'Menlo', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; background: var(--bg); }

  .page {
    width: 1080px;
    background: var(--bg);
    position: relative;
  }

  .page > .grain {
    position: absolute;
    inset: 0;
    filter: url(#noise);
    opacity: 0.04;
    pointer-events: none;
    z-index: 100;
  }

  mark { background: rgba(255,242,0,0.45); color: inherit; padding: 4px 8px; }

  .colophon {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 60px 36px;
    border-top: 1px solid rgba(45,41,38,0.08);
  }

  .colophon .who {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .colophon .who img {
    width: 40px; height: 40px;
    border-radius: 50%; object-fit: cover;
  }

  .colophon .who span {
    font: 400 24px/1 var(--sans);
    color: var(--ink-light);
  }

  .colophon .info-source {
    font: 400 22px/1 var(--mono);
    color: var(--ink-light);
  }

  {{CUSTOM_CSS}}
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute">
  <filter id="noise">
    <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
  </filter>
</svg>
<div class="page">
  <div class="grain"></div>
  {{CONTENT_HTML}}
  <div class="colophon">
    <div class="who">
      <img src="{{LOGO}}" alt="">
      <span>李继刚</span>
    </div>
    {{SOURCE_LINE}}
  </div>
</div>
</body>
</html>
