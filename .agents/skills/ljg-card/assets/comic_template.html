<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=DM+Sans:wght@400;500;700&display=swap');

  :root {
    --bg: #FAFAFA;
    --ink: #1a1a1a;
    --ink-mid: #555;
    --ink-light: #999;
    --white: #FAFAFA;
    --accent: #1a1a1a;
    --tone: #E8E8E8;
    --serif: 'Noto Serif SC', 'KingHwa_OldSong', Georgia, serif;
    --sans: 'DM Sans', 'PingFang SC', system-ui, sans-serif;
    --mono: 'SF Mono', 'Menlo', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; background: var(--bg); }

  .page {
    width: 1080px;
    background: var(--bg);
    position: relative;
  }

  /* ink spatter texture */
  .page > .grain {
    position: absolute;
    inset: 0;
    filter: url(#inkgrain);
    opacity: 0.03;
    pointer-events: none;
    z-index: 100;
  }

  .colophon {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 60px 36px;
    border-top: 3px solid var(--ink);
  }

  .colophon .who {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .colophon .who img {
    width: 40px; height: 40px;
    border-radius: 50%; object-fit: cover;
  }

  .colophon .who span {
    font: 400 24px/1 var(--sans);
    color: var(--ink-mid);
  }

  .colophon .info-source {
    font: 400 22px/1 var(--mono);
    color: var(--ink-light);
  }

  {{CUSTOM_CSS}}
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute">
  <!-- ink grain filter -->
  <filter id="inkgrain">
    <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
  </filter>
  <!-- halftone dot pattern -->
  <filter id="halftone">
    <feTurbulence type="turbulence" baseFrequency="0.05" numOctaves="1"/>
    <feColorMatrix type="saturate" values="0"/>
    <feComponentTransfer>
      <feFuncA type="discrete" tableValues="0 1"/>
    </feComponentTransfer>
  </filter>
  <!-- rough ink edge -->
  <filter id="roughen">
    <feTurbulence type="turbulence" baseFrequency="0.04" numOctaves="4" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
</svg>
<div class="page">
  <div class="grain"></div>
  {{CONTENT_HTML}}
  <div class="colophon">
    <div class="who">
      <img src="{{LOGO}}" alt="">
      <span>李继刚</span>
    </div>
    {{SOURCE_LINE}}
  </div>
</div>
</body>
</html>
